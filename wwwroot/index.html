<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Management System</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Document Management System</h1>
            <p>Verwalten Sie Ihre Dokumente einfach und effizient</p>
        </header>

        <!-- Upload Section -->
        <section class="upload-section">
            <h2>Dokument hochladen</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="file-input-container">
                    <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt" required>
                    <label for="fileInput" class="file-label">
                        Datei auswählen
                    </label>
                    <span id="fileName" class="file-name"></span>
                </div>
                <button type="submit" id="uploadBtn" class="btn btn-primary">
                    Hochladen
                </button>
            </form>
            <div id="uploadStatus" class="status-message"></div>
        </section>

        <!-- Search Section -->
        <section class="search-section">
            <h2>Dokumente suchen</h2>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Dokumentenname eingeben...">
                <button id="searchBtn" class="btn btn-secondary">
                    Suchen
                </button>
                <button id="showAllBtn" class="btn btn-secondary">
                    Alle anzeigen
                </button>
            </div>
        </section>

        <!-- Documents List -->
        <section class="documents-section">
            <h2>Dokumente</h2>
            <div id="loadingSpinner" class="loading" style="display: none;">
                Lade Dokumente...
            </div>
            <div id="documentsContainer">
                <p class="no-documents">Keine Dokumente gefunden. Laden Sie das erste Dokument hoch!</p>
            </div>
        </section>

        <!-- Document Detail Modal -->
        <div id="documentModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="documentDetails">
                    <!-- Document details will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
